<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFBLI — Call Center Demo</title>
  <link rel="stylesheet" href="callcenter.css">
</head>
<body>
  <div class="cc-layout">
    <!-- Left panel: SFBLI site with screenshot backgrounds -->
    <div class="cc-site">
      <div class="cc-site-content" id="site-content">
        <!-- Nav overlay bar — sits on top of the screenshot's real nav -->
        <div class="cc-nav-overlay">
          <a class="cc-nav-logo" data-page="home">
            <span class="cc-nav-logo-tagline">Your Friends<br>for <em>Life.</em></span>
            <span class="cc-nav-logo-name"><strong>SOUTHERN FARM BUREAU</strong><br>LIFE INSURANCE COMPANY</span>
          </a>
          <div class="cc-nav-links">
            <a class="cc-nav-link" data-page="home">About Us</a>
            <a class="cc-nav-link" data-page="home">Blog</a>
            <a class="cc-nav-link cc-nav-link-active" data-page="policies">Products</a>
            <a class="cc-nav-link" data-page="home">Services</a>
            <a class="cc-nav-link" data-page="home">My Policies</a>
            <a class="cc-nav-link" data-page="home">Pay Online</a>
            <a class="cc-nav-link" data-page="home">Login</a>
          </div>
        </div>
        <!-- Sidebar overlay — sits on top of the screenshot's real sidebar -->
        <div class="cc-sidebar-overlay">
          <a class="cc-sidebar-item" data-page="home">
            <span class="cc-sidebar-icon">&#x2795;&#x2796;<br>&#x00F7;&#x2716;</span>
            <span class="cc-sidebar-label">Calculator</span>
          </a>
          <a class="cc-sidebar-item" data-page="home">
            <span class="cc-sidebar-icon">&#x1F50D;</span>
            <span class="cc-sidebar-label">Find Agent</span>
          </a>
          <a class="cc-sidebar-item" data-page="claims">
            <span class="cc-sidebar-icon">&#x1F4CB;</span>
            <span class="cc-sidebar-label">Report Claim</span>
          </a>
          <a class="cc-sidebar-item" data-page="home">
            <span class="cc-sidebar-icon">&#x1F4BC;</span>
            <span class="cc-sidebar-label">Careers</span>
          </a>
        </div>
        <!-- Content will be rendered dynamically -->
      </div>
    </div>

    <!-- Right panel: Events stream -->
    <div class="cc-events-panel">
      <div class="cc-profile-header">
        <div class="cc-profile-avatar" id="profile-avatar">?</div>
        <div class="cc-profile-info">
          <div class="cc-profile-name" id="profile-name">Anonymous Visitor</div>
          <div class="cc-profile-id" id="profile-id">visitor_unknown</div>
          <div class="cc-profile-badges" id="profile-badges">
            <span class="cc-profile-badge">Anonymous</span>
          </div>
        </div>
      </div>

      <div class="cc-events-stream">
        <div class="cc-events-section">
          <div class="cc-section-label">Customer Journey</div>
          <div class="cc-event-list" id="event-list">
            <!-- Events will be added here -->
          </div>
        </div>

        <div class="cc-events-section hidden" id="transcript-section">
          <div class="cc-section-label" id="transcript-label">Call Transcript</div>
          <div class="cc-transcript-list" id="transcript-list">
            <!-- Transcript entries will be added here -->
          </div>
        </div>
      </div>

      <div class="cc-call-bar idle" id="call-bar">
        <div class="cc-call-indicator"></div>
        <div class="cc-call-status" id="call-status">No active call</div>
        <div class="cc-call-timer hidden" id="call-timer">00:00</div>
      </div>
    </div>
  </div>

  <script src="callcenter.js"></script>
</body>
</html>
